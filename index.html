<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ระบบแจ้งซ่อม</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8fafc;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

footer{
    margin-top:40px;
    text-align:center;
    color:#6b7280;
}

</style>
</head>
<body>

<div class="container py-4">

    <h2 class="text-center mb-4">
        🔧 ระบบแจ้งซ่อม
    </h2>

    <div class="card p-4">

        <form id="repairForm">

            <div class="mb-3">
                <label>ชื่อผู้แจ้ง</label>
                <input type="text" class="form-control" id="name" required>
            </div>

            <div class="mb-3">
                <label>แผนก</label>
                <input type="text" class="form-control" id="department">
            </div>

            <div class="mb-3">
                <label>หัวข้อปัญหา</label>
                <input type="text" class="form-control" id="title" required>
            </div>

            <div class="mb-3">
                <label>รายละเอียด</label>
                <textarea class="form-control" id="detail" rows="4"></textarea>
            </div>

            <button class="btn btn-primary w-100">
                ส่งแจ้งซ่อม
            </button>

        </form>

    </div>

    <div class="card mt-4 p-4">

        <h4>รายการแจ้งซ่อม</h4>

        <div class="table-responsive">

            <table class="table table-bordered">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ชื่อ</th>
                        <th>หัวข้อ</th>
                        <th>สถานะ</th>
                    </tr>
                </thead>

                <tbody id="repairTable"></tbody>

            </table>

        </div>

    </div>

    <footer>
        © 2026 Chonlathi DEV
    </footer>

</div>

<script>

loadRepairs();

document.getElementById('repairForm')
.addEventListener('submit', function(e){

    e.preventDefault();

    const data = {
        name: document.getElementById('name').value,
        department: document.getElementById('department').value,
        title: document.getElementById('title').value,
        detail: document.getElementById('detail').value
    };

    google.script.run
    .withSuccessHandler(function(res){

        alert('แจ้งซ่อมสำเร็จ\nเลขที่: '+res.id);

        document.getElementById('repairForm').reset();

        loadRepairs();

    })
    .addRepair(data);

});

function loadRepairs(){

    google.script.run
    .withSuccessHandler(function(rows){

        let html = '';

        rows.forEach(function(r){

            html += `
            <tr>
                <td>${r[0]}</td>
                <td>${r[2]}</td>
                <td>${r[4]}</td>
                <td>
                    <span class="badge bg-warning text-dark">
                        ${r[6]}
                    </span>
                </td>
            </tr>
            `;

        });

        document.getElementById('repairTable').innerHTML = html;

    })
    .getRepairs();
}

</script>

</body>
</html>
